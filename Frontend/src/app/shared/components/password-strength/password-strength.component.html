<div class="mt-2">
  <div class="flex gap-1">
    @for (bar of [1,2,3,4,5]; track bar) {
      <div
        class="h-2 flex-1 rounded-full"
        [class]="bar <= strength.score ? strength.className : 'bg-slate-200'"
      ></div>
    }
  </div>

  <p class="mt-1 text-xs text-slate-500">
    Password Strength:
    <span class="font-semibold">
      {{ strength.level }}
    </span>
  </p>
</div>
