<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 px-4 backdrop-blur-sm">
  <div class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-xl">
    <div class="flex items-start gap-4">
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg bg-red-50 text-lg font-bold text-red-700">
        !
      </div>

      <div>
        <h2 class="text-xl font-bold text-slate-900">
          {{ title }}
        </h2>

        <p class="mt-2 text-sm leading-6 text-slate-600">
          {{ message }}
        </p>
      </div>
    </div>

    <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <button
        type="button"
        (click)="cancelled.emit()"
        [disabled]="isLoading"
        class="inline-flex min-h-11 items-center justify-center rounded-lg border border-slate-300 bg-white px-5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ cancelText }}
      </button>

      <button
        type="button"
        (click)="confirmed.emit()"
        [disabled]="isLoading"
        class="inline-flex min-h-11 items-center justify-center rounded-lg bg-red-600 px-5 text-sm font-semibold text-white transition hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isLoading ? loadingText : confirmText }}
      </button>
    </div>
  </div>
</div>
