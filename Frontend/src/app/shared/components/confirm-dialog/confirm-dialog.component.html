<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
    <h2 class="text-xl font-bold text-slate-900">
      {{ title }}
    </h2>

    <p class="mt-3 text-sm text-slate-600">
      {{ message }}
    </p>

    <div class="mt-6 flex justify-end gap-3">
      <button
        type="button"
        (click)="cancelled.emit()"
        [disabled]="isLoading"
        class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 disabled:opacity-60"
      >
        {{ cancelText }}
      </button>

      <button
        type="button"
        (click)="confirmed.emit()"
        [disabled]="isLoading"
        class="rounded-xl bg-red-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-red-700 disabled:opacity-60"
      >
        {{ isLoading ? 'Deleting...' : confirmText }}
      </button>
    </div>
  </div>
</div>
