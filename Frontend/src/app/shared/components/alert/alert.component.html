@if (alertService.alert(); as alert) {
  <div class="fixed right-4 top-4 z-50 w-[380px] max-w-[calc(100vw-2rem)] rounded-lg border border-slate-200 bg-white p-4 shadow-xl sm:right-6 sm:top-6">
    <div class="flex items-start gap-3">
      <div
        class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-sm font-bold"
        [ngClass]="{
          'bg-emerald-50 text-emerald-700': alert.type === 'success',
          'bg-red-50 text-red-700': alert.type === 'error',
          'bg-amber-50 text-amber-700': alert.type === 'warning',
          'bg-blue-50 text-blue-700': alert.type === 'info'
        }"
      >
        !
      </div>

      <div class="min-w-0 flex-1">
        <p
          class="text-sm font-semibold"
          [ngClass]="{
            'text-emerald-700': alert.type === 'success',
            'text-red-700': alert.type === 'error',
            'text-amber-700': alert.type === 'warning',
            'text-blue-700': alert.type === 'info'
          }"
        >
          {{ alert.type | titlecase }}
        </p>

        <p class="mt-1 text-sm leading-5 text-slate-600">
          {{ alert.message }}
        </p>
      </div>

      <button
        type="button"
        (click)="close()"
        class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-xl leading-none text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
        aria-label="Close alert"
      >
        x
      </button>
    </div>
  </div>
}
